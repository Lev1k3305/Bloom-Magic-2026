<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bloom Magic 2026 🌸</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --pink: #ff007f; --gold: #ffd700; --violet: #7000ff; --dark: #0f001a; }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; 
            background: var(--dark); color: white; overflow: hidden; height: 100vh;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a0033 0%, #0f001a 100%); }

        .container {
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box;
        }

        .screen { 
            display: none; flex-direction: column; align-items: center; width: 100%; 
            text-align: center; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
        }
        .active { display: flex; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .lang-picker { display: flex; gap: 10px; margin-bottom: 40px; }
        .lang-btn { 
            padding: 10px 20px; border: 2px solid rgba(255,255,255,0.2); border-radius: 15px; 
            cursor: pointer; background: rgba(255,255,255,0.05); transition: 0.4s; font-weight: bold;
        }
        .lang-btn.selected { background: var(--pink); border-color: var(--pink); box-shadow: 0 0 20px var(--pink); transform: translateY(-3px); }

        input {
            width: 85%; max-width: 320px; padding: 20px; border-radius: 35px;
            border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); color: white;
            text-align: center; font-size: 1.3rem; margin-bottom: 25px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); background: rgba(255,255,255,0.1); }

        .main-btn {
            width: 85%; max-width: 320px; padding: 20px; border-radius: 50px;
            border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1.5px; transition: 0.4s;
            background: linear-gradient(45deg, var(--pink), var(--violet)); color: white;
            box-shadow: 0 5px 20px rgba(112, 0, 255, 0.4);
            margin-top: 10px;
        }
        .main-btn:active { transform: scale(0.95); }
        .main-btn:hover { box-shadow: 0 8px 25px rgba(255, 0, 127, 0.6); transform: translateY(-2px); }

        .flower-card { font-size: 4rem; cursor: pointer; transition: 0.5s; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .flower-card:hover { transform: rotate(15deg) scale(1.2); filter: drop-shadow(0 0 20px var(--pink)); }

        #final-card-frame {
            width: 100%; max-width: 360px; background: rgba(255,255,255,0.07);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px; padding: 40px 20px; position: relative;
        }
        #f-personalized-name { font-family: 'Caveat', cursive; font-size: 4rem; margin: 0; color: var(--gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }

        .scratch-box { position: relative; width: 280px; height: 160px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); }
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; touch-action: none; }
        .letter-content { background: white; color: #222; height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px; font-weight: 500; line-height: 1.4; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div id="screen-0" class="screen active">
            <div class="lang-picker">
                <div class="lang-btn selected" onclick="updateLang('ru', this)">RU</div>
                <div class="lang-btn" onclick="updateLang('kz', this)">KZ</div>
                <div class="lang-btn" onclick="updateLang('en', this)">EN</div>
                <div class="lang-btn" onclick="updateLang('jp', this)">JP</div>
            </div>
            <h1 id="txt-welcome" style="font-size: 1.8rem; margin-bottom: 30px;">Весна начинается с тебя...</h1>
            <button class="main-btn" onclick="showScreen(1)" id="btn-start">Начать ✨</button>
        </div>

        <div id="screen-1" class="screen">
            <h1 id="txt-choice" style="margin-bottom: 40px;">Выбери свой цветок 💐</h1>
            <div style="display: flex; gap: 30px;">
                <div class="flower-card" onclick="pickFlower('🌷')">🌷</div>
                <div class="flower-card" onclick="pickFlower('🌹')">🌹</div>
                <div class="flower-card" onclick="pickFlower('🌸')">🌸</div>
            </div>
        </div>

        <div id="screen-2" class="screen">
            <input type="text" id="nameInput" placeholder="Твое имя...">
            <button class="main-btn" onclick="runMagic()" id="btn-open">Открыть подарок</button>
        </div>

        <div id="screen-3" class="screen">
            <div id="final-card-frame">
                <h1 id="f-personalized-name"></h1> 
                <p id="f-title" style="letter-spacing: 3px; font-weight: bold; opacity: 0.7; margin-top: 10px;"></p>
                <div style="width: 50px; height: 3px; background: var(--pink); margin: 20px auto;"></div>
                <p id="f-msg" style="font-size: 1.2rem; min-height: 50px;"></p>
            </div>
            
            <button id="btn-letter" onclick="openLetter()" style="display:none; margin-top: 20px; background: none; border: 2px solid white; color: white;" class="main-btn">✉️ Личное письмо</button>
            <button id="btn-video" onclick="openVideo()" style="background: var(--gold); color: black;" class="main-btn">🎬 Смотреть видео</button>
            
            <a href="https://www.instagram.com/prost_aldi?igsh=cHY3ZXJrdmQ0dDky" target="_blank" style="text-decoration: none; width: 100%; display: flex; justify-content: center;">
                <button id="btn-insta" class="main-btn" style="background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; border: none;">
                    📸 Instagram
                </button>
            </a>
        </div>
    </div>

    <div id="overlay-letter" class="overlay">
        <h2 id="txt-scratch" style="color: var(--gold);">Сотри слой пальцем 👆</h2>
        <div class="scratch-box">
            <div id="letter-text" class="letter-content"></div>
            <canvas id="scratch-canvas" width="280" height="160"></canvas>
        </div>
        <button onclick="closeOverlay('overlay-letter')" class="main-btn" style="width: 150px; background: white; color: black;" id="btn-close-l">Закрыть</button>
    </div>

    <div id="overlay-video" class="overlay">
        <video id="v-player" controls playsinline style="width: 90%; max-width: 500px; border-radius: 15px;">
            <source src="./video.mp4" type="video/mp4">
        </video>
        <button onclick="closeVideo()" class="main-btn" style="width: 150px; background: white; color: black; margin-top: 20px;" id="btn-close-v">Закрыть</button>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw866-KPedBNu0W9HO-voeVp5e__hwg79o-MjSxK6vzW6bOKJ-0X9FYspAOt5Cgu1M/exec'; 

        const VIP_DATA = {
            "Аяулым": { card: "С 8 марта, красотка! 🌸", letter: "Аяу, ты просто космос! Не знаю, кто тебе там писал эти пожелания, но они все фигня по сравнению с тем, что я тебе сейчас скажу: Ты невероятная, умная и красивая. Пусть эта весна принесет тебе море счастья и любви!" },
            "Еркежан": { card: "С 8 марта, красавица! 🌷", letter: "Еркежан, ты как весенний цветок — нежная и прекрасная! Пусть эта весна принесет тебе море счастья и радости. Ты заслуживаешь только лучшего!" },
            "Тимур": { card: "С 8 марта, «очаровашка»! 😂", letter: "Тима, родной, с праздником! Какой 8 марта, иди на завод, суета не ждет! Ладно, шучу, ты лучший бро. Но за то, что зашел сюда под женским именем — с тебя шоколадка! 😂" },
        }

        const LANGS = {
            'ru': { welcome: "Весна начинается с тебя...", choice: "Выбери свой цветок 💐", start: "Начать ✨", open: "Открыть подарок", foryou: "ДЛЯ ТЕБЯ", video: "🎬 Смотреть видео", letter: "✉️ Личное письмо", scratch: "Сотри слой пальцем 👆", close: "Закрыть", placeholder: "Твое имя...", gen: "Создаем магию...", wishes: ["Пусть сбываются все мечты! 🌸", "Ты прекрасна, как эта весна! 🌷", "Сияй ярче всех звезд! ✨"] },
            'kz': { welcome: "Көктем сенен басталады...", choice: "Гүліңді таңда 💐", start: "Бастау ✨", open: "Сыйлықты ашу", foryou: "СЕН ҮШІН", video: "🎬 Видеоны көру", letter: "✉️ Жеке хат", scratch: "Алтын қабатты өшір 👆", close: "Жабу", placeholder: "Есімің кім?", gen: "Сиқыр дайындалуда...", wishes: ["Армандарың орындалсын! 🌸", "Көктемдей құлпыра бер! 🌷", "Жұлдыздай жарқыра! ✨"] },
            'en': { welcome: "Spring starts with you...", choice: "Pick your flower 💐", start: "Start ✨", open: "Open Gift", foryou: "FOR YOU", video: "🎬 Watch Video", letter: "✉️ Private Letter", scratch: "Scratch the layer 👆", close: "Close", placeholder: "Your name...", gen: "Creating magic...", wishes: ["May your dreams come true! 🌸", "You are as beautiful as spring! 🌷", "Shine brighter than the stars! ✨"] },
            'jp': { welcome: "春は君から始まる...", choice: "花を選んでね 💐", start: "開始 ✨", open: "ギフトを開く", foryou: "あなたへ", video: "🎬 ビデオを見る", letter: "✉️ 私信", scratch: "こすってみて 👆", close: "閉じる", placeholder: "お名前は...", gen: "魔法を作成中...", wishes: ["夢が叶いますように！ 🌸", "春のように美しいですね！ 🌷", "星より輝いて！ ✨"] }
        };

        let currentLang = 'ru';
        let flower = '🌸';
        let letter = '';

        function updateLang(l, btn) {
            currentLang = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            const t = LANGS[l];
            document.getElementById('txt-welcome').innerText = t.welcome;
            document.getElementById('btn-start').innerText = t.start;
            document.getElementById('txt-choice').innerText = t.choice;
            document.getElementById('btn-open').innerText = t.open;
            document.getElementById('nameInput').placeholder = t.placeholder;
            document.getElementById('btn-video').innerText = t.video;
            document.getElementById('btn-letter').innerText = t.letter;
            document.getElementById('txt-scratch').innerText = t.scratch;
            document.getElementById('btn-close-l').innerText = t.close;
            document.getElementById('btn-close-v').innerText = t.close;
            document.getElementById('btn-insta').innerText = (l === 'ru' ? "📸 Instagram" : (l === 'kz' ? "📸 Инстаграм" : "📸 Instagram"));
        }

        function showScreen(n) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-'+n).classList.add('active');
        }

        function pickFlower(f) { flower = f; showScreen(2); }

        async function runMagic() {
            let name = document.getElementById('nameInput').value.trim();
            if(!name) return;
            name = name.charAt(0).toUpperCase() + name.slice(1);
            
            showScreen(3);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            document.getElementById('f-personalized-name').innerText = name;
            document.getElementById('f-title').innerText = LANGS[currentLang].foryou;
            
            const msg = document.getElementById('f-msg');
            const data = VIP_DATA[name];

            if(data) {
                letter = data.letter;
                document.getElementById('btn-letter').style.display = 'block';
                msg.innerText = data.card;
            } else {
                document.getElementById('btn-letter').style.display = 'none';
                msg.innerText = LANGS[currentLang].gen;
                await new Promise(r => setTimeout(r, 1000));
                msg.innerText = LANGS[currentLang].wishes[Math.floor(Math.random()*3)];
            }

            if(SCRIPT_URL.length > 10) {
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, flower, lang: currentLang, status: data ? "VIP" : "Guest" }) });
            }
        }

        function openLetter() {
            document.getElementById('letter-text').innerText = letter;
            document.getElementById('overlay-letter').style.display = 'flex';
            const c = document.getElementById('scratch-canvas');
            const ctx = c.getContext('2d');
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(0,0,280,160);
            
            let draw = false;
            const move = (e) => {
                if(!draw) return;
                const r = c.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - r.left;
                const y = (e.clientY || e.touches[0].clientY) - r.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x,y,25,0,Math.PI*2); ctx.fill();
            };
            c.onmousedown = () => draw = true;
            window.onmouseup = () => draw = false;
            c.onmousemove = move;
            c.ontouchstart = () => draw = true;
            c.ontouchmove = move;
        }

        function openVideo() { document.getElementById('overlay-video').style.display='flex'; document.getElementById('v-player').play(); }
        function closeVideo() { document.getElementById('v-player').pause(); document.getElementById('overlay-video').style.display='none'; }
        function closeOverlay(id) { document.getElementById(id).style.display='none'; }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<40; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, s: Math.random()*0.5+0.2 });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            pts.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.s; if(p.y < -10) p.y = canvas.height+10;
            });
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>
</body>
</html>
